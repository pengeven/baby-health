<body>

  <nav class="top-bar">
    <a class="back-link" href="../index.html">← 返回</a>
    <span class="nav-title">意见与建议</span>
  </nav>

  <section class="feedback-hero">
    <div class="hero-icon">📝</div>
    <h1>意见与建议反馈</h1>
    <p class="sub">您的反馈是我们改进的动力，感谢您的参与！</p>
  </section>

  <div class="feedback-area">

    <!-- 问卷嵌入 -->
    <div class="survey-wrap" id="surveyWrap">
      <iframe id="surveyFrame" src="about:blank" height="700" allowfullscreen></iframe>
    </div>

    <!-- 如果 iframe 无法加载，显示备用跳转 -->
    <div class="fallback-section" id="fallbackSection">
      <div class="fallback-icon">📝</div>
      <div class="fallback-title">请在问卷页面填写反馈</div>
      <div class="fallback-desc">点击下方按钮前往问卷页面填写</div>
      <a class="fallback-link" id="fallbackLink" href="#" target="_blank">前往问卷填写</a>
    </div>

    <div class="tip-note">您的反馈仅管理员可见，请放心填写</div>

  </div>

  <div class="page-footer">
    <p>新生儿科健康宣教资料</p>
  </div>

  <script>
    const surveyLink = 'https://wj.qq.com/s2/27228627/cabe/';
    const frame = document.getElementById('surveyFrame');
    const wrap = document.getElementById('surveyWrap');
    const fallback = document.getElementById('fallbackSection');
    const fallbackLink = document.getElementById('fallbackLink');

    // 尝试用 iframe 加载
    frame.src = surveyLink;

    // 检测 iframe 是否加载成功
    frame.onload = function() {
      try {
        // 如果能访问 contentDocument 且不为空，说明加载成功
        var doc = frame.contentDocument || frame.contentWindow.document;
        if (doc && doc.body && doc.body.innerHTML.length > 0) {
          wrap.style.display = 'block';
          fallback.style.display = 'none';
        } else {
          showFallback();
        }
      } catch(e) {
        // 跨域无法访问，可能是加载成功了也可能是被拦截
        // 对于腾讯问卷，通常是被拦截，显示备用方案
        // 但我们还是先假设加载成功，让用户看到 iframe
        wrap.style.display = 'block';
        fallback.style.display = 'none';
      }
    };

    frame.onerror = function() {
      showFallback();
    };

    // 如果 iframe 加载超时（5秒），也显示备用
    setTimeout(function() {
      try {
        var doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.body || doc.body.innerHTML.length <= 50) {
          showFallback();
        }
      } catch(e) {
        // 跨域，保持 iframe 显示
      }
    }, 5000);

    function showFallback() {
      wrap.style.display = 'none';
      fallback.style.display = 'block';
      fallbackLink.href = surveyLink;
    }
  </script>

</body>
